name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '21'


    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Install Capacitor
      working-directory: frontend
      run: |
        npm install @capacitor/core
        npm install -D @capacitor/cli @capacitor/android

    - name: Initialize Capacitor
      working-directory: frontend
      run: |
        npx cap init "Antigravity Deck" "com.antigravity.deck" --web-dir out
        cat << 'EOF' > capacitor.config.ts
        import type { CapacitorConfig } from '@capacitor/cli';

        const config: CapacitorConfig = {
          appId: 'com.antigravity.deck',
          appName: 'Antigravity Deck',
          webDir: 'out',
          server: {
            cleartext: true
          }
        };

        export default config;
        EOF

    - name: Patch next.config.ts for Static Export
      working-directory: frontend
      run: |
        # Replace the dynamic proxy config with a static export config
        cat << 'EOF' > next.config.ts
        import type { NextConfig } from "next";

        const nextConfig: NextConfig = {
          output: 'export',
          reactStrictMode: true,
          poweredByHeader: false,
          images: {
            unoptimized: true
          }
        };

        export default nextConfig;
        EOF

    - name: Build Next.js
      working-directory: frontend
      env:
        NEXT_PUBLIC_BACKEND_URL: http://100.81.86.100:9807
      run: npm run build

    - name: Add Android Platform
      working-directory: frontend
      run: npx cap add android

    - name: Sync Capacitor
      working-directory: frontend
      run: npx cap sync android

    - name: Patch AndroidManifest for Cleartext Traffic
      working-directory: frontend
      run: |
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml

    - name: Build Android APK
      working-directory: frontend/android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        tag_name: "v1.0.${{ github.run_number }}"
        name: "Release v1.0.${{ github.run_number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
